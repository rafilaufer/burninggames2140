<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .clock {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .clock-city {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .clock-timezone {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 15px;
        }

        .clock-time {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .clock-ampm {
            font-size: 1.1em;
            color: #764ba2;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-add:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-remove {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-remove:hover {
            background: #ff5252;
        }

        .timezone-select {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            color: #333;
        }

        .timezone-select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }

        .info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            color: #333;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .info strong {
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 25px;
            }

            .clock-time {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ World Clock</h1>

        <div class="controls">
            <select id="timezoneSelect" class="timezone-select">
                <option value="">Select a timezone to add</option>
            </select>
            <button class="btn btn-add" onclick="addTimezone()">+ Add Clock</button>
        </div>

        <div id="clocksContainer" class="clocks-grid"></div>

        <div class="info">
            <strong>💡 Tip:</strong> Select a timezone from the dropdown and click "Add Clock" to display multiple time zones. Click the remove button on any clock to delete it. Your selections are saved automatically.
        </div>
    </div>

    <script>
        // Comprehensive list of timezones with cities
        const timezoneData = [
            { city: 'London', timezone: 'Europe/London', offset: 'GMT' },
            { city: 'New York', timezone: 'America/New_York', offset: 'EST/EDT' },
            { city: 'Los Angeles', timezone: 'America/Los_Angeles', offset: 'PST/PDT' },
            { city: 'Tokyo', timezone: 'Asia/Tokyo', offset: 'JST' },
            { city: 'Sydney', timezone: 'Australia/Sydney', offset: 'AEDT/AEST' },
            { city: 'Dubai', timezone: 'Asia/Dubai', offset: 'GST' },
            { city: 'Singapore', timezone: 'Asia/Singapore', offset: 'SGT' },
            { city: 'Hong Kong', timezone: 'Asia/Hong_Kong', offset: 'HKT' },
            { city: 'Mumbai', timezone: 'Asia/Kolkata', offset: 'IST' },
            { city: 'Bangkok', timezone: 'Asia/Bangkok', offset: 'ICT' },
            { city: 'Moscow', timezone: 'Europe/Moscow', offset: 'MSK' },
            { city: 'Paris', timezone: 'Europe/Paris', offset: 'CET/CEST' },
            { city: 'Berlin', timezone: 'Europe/Berlin', offset: 'CET/CEST' },
            { city: 'Dubai', timezone: 'Asia/Dubai', offset: 'GST' },
            { city: 'Toronto', timezone: 'America/Toronto', offset: 'EST/EDT' },
            { city: 'Mexico City', timezone: 'America/Mexico_City', offset: 'CST/CDT' },
            { city: 'São Paulo', timezone: 'America/Sao_Paulo', offset: 'BRT' },
            { city: 'Buenos Aires', timezone: 'America/Argentina/Buenos_Aires', offset: 'ART' },
            { city: 'Cape Town', timezone: 'Africa/Johannesburg', offset: 'SAST' },
            { city: 'Cairo', timezone: 'Africa/Cairo', offset: 'EET' },
            { city: 'Bangkok', timezone: 'Asia/Bangkok', offset: 'ICT' },
            { city: 'Istanbul', timezone: 'Europe/Istanbul', offset: 'EET' },
            { city: 'Bangkok', timezone: 'Asia/Bangkok', offset: 'ICT' },
            { city: 'Seoul', timezone: 'Asia/Seoul', offset: 'KST' },
            { city: 'Shanghai', timezone: 'Asia/Shanghai', offset: 'CST' },
            { city: 'Auckland', timezone: 'Pacific/Auckland', offset: 'NZDT/NZST' },
            { city: 'Honolulu', timezone: 'Pacific/Honolulu', offset: 'HST' },
            { city: 'Anchorage', timezone: 'America/Anchorage', offset: 'AKST/AKDT' },
            { city: 'Dublin', timezone: 'Europe/Dublin', offset: 'GMT/IST' },
            { city: 'Bangkok', timezone: 'Asia/Bangkok', offset: 'ICT' }
        ];

        // Remove duplicates
        const uniqueTimezones = [];
        const seen = new Set();
        timezoneData.forEach(item => {
            if (!seen.has(item.timezone)) {
                uniqueTimezones.push(item);
                seen.add(item.timezone);
            }
        });

        // Default timezones to show
        const defaultTimezones = ['Europe/London', 'America/New_York', 'Asia/Tokyo'];

        // Initialize
        function initializeApp() {
            populateTimezoneSelect();
            loadTimezones();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        function populateTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            uniqueTimezones.forEach(item => {
                const option = document.createElement('option');
                option.value = item.timezone;
                option.textContent = `${item.city} (${item.offset})`;
                select.appendChild(option);
            });
        }

        function loadTimezones() {
            const saved = localStorage.getItem('selectedTimezones');
            const timezones = saved ? JSON.parse(saved) : defaultTimezones;
            const container = document.getElementById('clocksContainer');
            container.innerHTML = '';
            timezones.forEach(timezone => {
                addClockElement(timezone);
            });
        }

        function saveTimezones() {
            const clocks = Array.from(document.querySelectorAll('.clock')).map(clock => 
                clock.dataset.timezone
            );
            localStorage.setItem('selectedTimezones', JSON.stringify(clocks));
        }

        function addTimezone() {
            const select = document.getElementById('timezoneSelect');
            const timezone = select.value;
            
            if (!timezone) {
                alert('Please select a timezone');
                return;
            }

            const container = document.getElementById('clocksContainer');
            const existingClock = container.querySelector(`[data-timezone="${timezone}"]`);
            
            if (existingClock) {
                alert('This timezone is already displayed');
                return;
            }

            addClockElement(timezone);
            saveTimezones();
            select.value = '';
        }

        function addClockElement(timezone) {
            const container = document.getElementById('clocksContainer');
            const tzData = uniqueTimezones.find(item => item.timezone === timezone);
            
            if (!tzData) return;

            const clockDiv = document.createElement('div');
            clockDiv.className = 'clock';
            clockDiv.dataset.timezone = timezone;
            clockDiv.innerHTML = `
                <div class="clock-city">${tzData.city}</div>
                <div class="clock-timezone">${tzData.offset}</div>
                <div class="clock-time" data-time="">--:--:--</div>
                <div class="clock-ampm"></div>
                <button class="btn btn-remove" onclick="removeClock('${timezone}')">Remove</button>
            `;
            container.appendChild(clockDiv);
        }

        function removeClock(timezone) {
            const container = document.getElementById('clocksContainer');
            const clock = container.querySelector(`[data-timezone="${timezone}"]`);
            if (clock) {
                clock.remove();
                saveTimezones();
            }
        }

        function updateClocks() {
            const clocks = document.querySelectorAll('.clock');
            clocks.forEach(clock => {
                const timezone = clock.dataset.timezone;
                const time = getTimeInTimezone(timezone);
                const timeElement = clock.querySelector('.clock-time');
                const ampmElement = clock.querySelector('.clock-ampm');
                
                timeElement.textContent = time.time;
                ampmElement.textContent = time.ampm;
            });
        }

        function getTimeInTimezone(timezone) {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const formatterAMPM = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });

            const parts = formatterAMPM.formatToParts(now);
            const ampm = parts.find(p => p.type === 'dayPeriod')?.value || '';
            const timeStr = formatter.format(now);

            return {
                time: timeStr,
                ampm: ampm
            };
        }

        // Start the app
        initializeApp();
    </script>
</body>
</html>
